<svg viewBox="0 0 680 560" width="100%" role="img">
  <title>现有导航结构与Skill入口位置</title>
  <desc>展示HR Portal现有侧边栏菜单结构，标注新增的AI技能管理入口位置</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
      markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
        stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <style>
    .th{font-family:system-ui;font-size:14px;font-weight:500;fill:#2C2C2A}
    .ts{font-family:system-ui;font-size:12px;fill:#5F5E5A}
    .tc{font-family:system-ui;font-size:11px;fill:#888780}
    .mono{font-family:monospace;font-size:10px;fill:#444441}
    .new{fill:#E1F5EE;stroke:#1D9E75;stroke-width:1}
    .exist{fill:#F1EFE8;stroke:#B4B2A9;stroke-width:0.5}
  </style>

  <text class="th" x="40" y="30" font-size="15">现有导航结构与 Skill 入口位置</text>
  <text class="ts" x="40" y="50">侧边栏菜单 — 绿色标注为新增项</text>

  <g>
    <rect x="40" y="75" width="280" height="465" rx="8" fill="#fff" stroke="#B4B2A9" stroke-width="0.5"/>
