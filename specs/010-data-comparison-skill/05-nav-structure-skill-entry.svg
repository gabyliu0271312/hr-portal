    <rect x="55" y="234" width="250" height="32" rx="6" class="exist"/>
    <text class="ts" x="85" y="254">月度工资</text>

    <rect x="55" y="272" width="250" height="32" rx="6" class="exist"/>
    <text class="ts" x="85" y="292">成本管理</text>

    <rect x="55" y="314" width="250" height="32" rx="6" class="exist"/>
    <text class="ts" x="70" y="334">报表中心</text>

    <rect x="55" y="352" width="250" height="32" rx="6" class="exist"/>
    <text class="ts" x="70" y="372">自动通知</text>

    <rect x="55" y="394" width="250" height="32" rx="6" class="exist"/>
