    <rect x="390" y="85" width="250" height="170" rx="10" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
    <text class="th" x="515" y="110" text-anchor="middle" fill="#085041">入口1：系统管理</text>
