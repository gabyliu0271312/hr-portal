    <text class="th" x="515" y="450" text-anchor="middle" fill="#633806">入口3：对话结果</text>
    <text class="th" x="515" y="468" text-anchor="middle" fill="#633806">存为技能按钮</text>
    <text class="tc" x="410" y="495">调试满意后一键存档</text>
    <text class="tc" x="410" y="513">保存中文指令 + 参数</text>
    <text class="tc" x="410" y="531">下次直接调用</text>
