    <text class="th" x="370" y="194" fill="#fff">工资表金额汇总</text>
    <text class="ts" x="615" y="194" text-anchor="end" fill="#fff">启用中</text>

    <text class="tc" x="370" y="222">指令: 对比{{月份}}工资表应发总额</text>
    <text class="tc" x="370" y="238">和成本归集表的金额一致性</text>

    <text class="tc" x="370" y="262">类型: 金额对比</text>
    <text class="tc" x="370" y="278">上次执行: 2026-06-20</text>

    <rect x="370" y="282" width="50" height="8" rx="3" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
    <text class="tc" x="395" y="289" text-anchor="middle" font-size="9px">调用</text>
    <rect x="425" y="282" width="50" height="8" rx="3" fill="#fff" stroke="#B4B2A9" stroke-width="0.5"/>
    <text class="tc" x="450" y="289" text-anchor="middle" font-size="9px">编辑</text>
    <rect x="480" y="282" width="50" height="8" rx="3" fill="#fff" stroke="#B4B2A9" stroke-width="0.5"/>
    <text class="tc" x="505" y="289" text-anchor="middle" font-size="9px">删除</text>
  </g>

  <g>
    <rect x="40" y="310" width="285" height="120" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
    <rect x="40" y="310" width="285" height="28" rx="8" fill="#534AB7"/>
    <text class="th" x="55" y="329" fill="#fff">员工信息字段对比</text>
    <text class="ts" x="300" y="329" text-anchor="end" fill="#fff">草稿</text>

    <text class="tc" x="55" y="357">指令: 对比月度花名册和工资表</text>
    <text class="tc" x="55" y="373">的员工基本信息是否一致</text>

    <text class="tc" x="55" y="397">类型: 字段对比</text>
    <text class="tc" x="55" y="413">未执行过</text>

    <rect x="55" y="417" width="50" height="8" rx="3" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
    <text class="tc" x="80" y="424" text-anchor="middle" font-size="9px">调用</text>
    <rect x="110" y="417" width="50" height="8" rx="3" fill="#fff" stroke="#B4B2A9" stroke-width="0.5"/>
    <text class="tc" x="135" y="424" text-anchor="middle" font-size="9px">编辑</text>
    <rect x="165" y="417" width="50" height="8" rx="3" fill="#fff" stroke="#B4B2A9" stroke-width="0.5"/>
    <text class="tc" x="190" y="424" text-anchor="middle" font-size="9px">删除</text>
  </g>

  <g>
    <rect x="355" y="310" width="285" height="120" rx="8" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.5"/>
    <rect x="355" y="310" width="285" height="28" rx="8" fill="#EF9F27"/>
    <text class="th" x="370" y="329" fill="#fff">部门成本分摊对比</text>
    <text class="ts" x="615" y="329" text-anchor="end" fill="#fff">已停用</text>

    <text class="tc" x="370" y="357">指令: 对比{{月份}}成本分摊表</text>
    <text class="tc" x="370" y="373">和成本归集表的分摊金额</text>

    <text class="tc" x="370" y="397">类型: 金额对比</text>
    <text class="tc" x="370" y="413">上次执行: 2026-05-31</text>

    <rect x="370" y="417" width="50" height="8" rx="3" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.5"/>
    <text class="tc" x="395" y="424" text-anchor="middle" font-size="9px">调用</text>
    <rect x="425" y="417" width="50" height="8" rx="3" fill="#fff" stroke="#B4B2A9" stroke-width="0.5"/>
    <text class="tc" x="450" y="424" text-anchor="middle" font-size="9px">编辑</text>
    <rect x="480" y="417" width="50" height="8" rx="3" fill="#fff" stroke="#B4B2A9" stroke-width="0.5"/>
    <text class="tc" x="505" y="424" text-anchor="middle" font-size="9px">删除</text>
  </g>

  <g>
    <rect x="40" y="450" width="600" height="120" rx="8" fill="#fff" stroke="#B4B2A9" stroke-width="0.5"/>
    <text class="th" x="60" y="475" fill="#3C3489">编辑技能弹窗（点击编辑时弹出）</text>

    <text class="tc" x="60" y="500">技能名称</text>
    <rect x="140" y="488" width="200" height="20" rx="4" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
    <text class="tc" x="148" y="502">花名册名单对比</text>

    <text class="tc" x="60" y="530">技能指令（中文自然语言）</text>
    <rect x="60" y="538" width="560" height="24" rx="4" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
    <text class="mono" x="68" y="554">对比{{月份}}月度花名册和实时花名册的名单一致性，按部门分组显示差异</text>
  </g>
</svg>