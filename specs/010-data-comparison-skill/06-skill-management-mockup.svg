<svg viewBox="0 0 680 580" width="100%" role="img">
  <title>AI技能管理页面原型</title>
  <desc>AI技能管理页面的界面原型，展示技能列表、卡片、编辑、调用等功能区域</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
      markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
        stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <style>
    .th{font-family:system-ui;font-size:14px;font-weight:500;fill:#2C2C2A}
    .ts{font-family:system-ui;font-size:12px;fill:#5F5E5A}
    .tc{font-family:system-ui;font-size:11px;fill:#888780}
    .mono{font-family:monospace;font-size:10px;fill:#444441}
  </style>

  <text class="th" x="40" y="30" font-size="15">AI 技能管理页面原型</text>
  <text class="ts" x="40" y="50">路由 /system/ai-skills — 系统管理下新增菜单</text>

  <g>
    <rect x="40" y="75" width="600" height="40" rx="8" fill="#fff" stroke="#B4B2A9" stroke-width="0.5"/>
    <text class="th" x="60" y="100" fill="#2C2C2A">AI 技能管理</text>

    <rect x="500" y="83" width="120" height="26" rx="6" fill="#378ADD"/>
    <text class="ts" x="560" y="100" text-anchor="middle" fill="#fff">+ 新建技能</text>
  </g>

  <g>
    <rect x="40" y="125" width="600" height="36" rx="6" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
    <text class="tc" x="55" y="148">搜索技能名称或指令内容...</text>
    <text class="tc" x="500" y="148">类型:</text>
    <rect x="535" y="133" width="90" height="22" rx="4" fill="#fff" stroke="#B4B2A9" stroke-width="0.5"/>
    <text class="tc" x="580" y="148" text-anchor="middle">全部</text>
  </g>

  <g>
    <rect x="40" y="175" width="285" height="120" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
    <rect x="40" y="175" width="285" height="28" rx="8" fill="#1D9E75"/>
    <text class="th" x="55" y="194" fill="#fff">花名册名单对比</text>
    <text class="ts" x="300" y="194" text-anchor="end" fill="#fff">启用中</text>

    <text class="tc" x="55" y="222">指令: 对比{{月份}}月度花名册和</text>
    <text class="tc" x="55" y="238">实时花名册的名单一致性</text>

    <text class="tc" x="55" y="262">类型: 名单对比</text>
    <text class="tc" x="55" y="278">上次执行: 2026-06-25</text>

    <rect x="55" y="282" width="50" height="8" rx="3" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
    <text class="tc" x="80" y="289" text-anchor="middle" font-size="9px">调用</text>
    <rect x="110" y="282" width="50" height="8" rx="3" fill="#fff" stroke="#B4B2A9" stroke-width="0.5"/>
    <text class="tc" x="135" y="289" text-anchor="middle" font-size="9px">编辑</text>
    <rect x="165" y="282" width="50" height="8" rx="3" fill="#fff" stroke="#B4B2A9" stroke-width="0.5"/>
    <text class="tc" x="190" y="289" text-anchor="middle" font-size="9px">删除</text>
  </g>

  <g>
    <rect x="355" y="175" width="285" height="120" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
