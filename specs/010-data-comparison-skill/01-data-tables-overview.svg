<svg viewBox="0 0 680 560" width="100%" role="img">
  <title>HR核心数据表与对比检查场景</title>
  <desc>展示HR系统数据链路：实时花名册到分摊结果的完整链路，标注三种对比检查场景</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
      markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
        stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <style>
    .th{font-family:system-ui;font-size:14px;font-weight:500;fill:#2C2C2A}
    .ts{font-family:system-ui;font-size:12px;fill:#5F5E5A}
    .tc{font-family:system-ui;font-size:11px;fill:#888780}
    .mono{font-family:monospace;font-size:11px;fill:#444441}
  </style>

  <text class="th" x="40" y="30" font-size="15">HR 核心数据表与对比检查场景</text>
  <text class="ts" x="40" y="50">数据链路：每一跳都可能出现不一致</text>

  <g>
    <rect x="40" y="80" width="560" height="60" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
    <text class="th" x="60" y="105" fill="#0C447C">实时花名册</text>
    <text class="ts" x="60" y="124" fill="#185FA5">employee_roster_live</text>
    <text class="tc" x="200" y="105">北森同步 · 实时更新</text>
    <text class="tc" x="200" y="124">工号、姓名、部门、岗位、状态</text>
  </g>

  <line x1="200" y1="145" x2="200" y2="175" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <g>
    <rect x="40" y="180" width="560" height="60" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
    <text class="th" x="60" y="205" fill="#085041">月度花名册</text>
    <text class="ts" x="60" y="224" fill="#0F6E56">employee_roster_monthly</text>
    <text class="tc" x="220" y="205">每月快照 · period_ym</text>
    <text class="tc" x="220" y="224">同上 + 月度冻结字段</text>
  </g>

  <line x1="200" y1="245" x2="200" y2="275" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <g>
    <rect x="40" y="280" width="560" height="60" rx="8" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.5"/>
    <text class="th" x="60" y="305" fill="#633806">月度工资表</text>
    <text class="ts" x="60" y="324" fill="#854F0B">salary_monthly</text>
    <text class="tc" x="220" y="305">每月核算 · period_ym</text>
    <text class="tc" x="220" y="324">工号、应发、扣款、实发、社保</text>
  </g>

  <line x1="200" y1="345" x2="200" y2="375" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <g>
    <rect x="40" y="380" width="260" height="60" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
    <text class="th" x="60" y="405" fill="#444441">成本分摊表</text>
    <text class="ts" x="60" y="424" fill="#5F5E5A">cost_allocation</text>
    <text class="tc" x="170" y="405">分摊规则</text>
    <text class="tc" x="170" y="424">工号、成本中心、比例</text>
  </g>

  <line x1="320" y1="410" x2="370" y2="410" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <g>
    <rect x="380" y="380" width="220" height="60" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
    <text class="th" x="400" y="405" fill="#444441">成本归集表</text>
    <text class="ts" x="400" y="424" fill="#5F5E5A">cost_collection</text>
    <text class="tc" x="500" y="415">汇总归集</text>
  </g>

  <line x1="490" y1="445" x2="490" y2="465" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <g>
    <rect x="380" y="470" width="220" height="50" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
    <text class="th" x="400" y="495" fill="#444441">分摊结果</text>
    <text class="ts" x="500" y="495">cost_result</text>
  </g>

  <g>
    <rect x="40" y="470" width="260" height="80" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="0.5"/>
    <text class="th" x="60" y="495" fill="#712B13">三种对比检查场景</text>
    <text class="ts" x="60" y="514" fill="#993C1D">1. 名单一致性 — 谁多谁少</text>
    <text class="ts" x="60" y="531" fill="#993C1D">2. 基本信息一致性 — 字段差异</text>
    <text class="ts" x="60" y="548" fill="#993C1D">3. 金额汇总一致性 — 数值对账</text>
  </g>
</svg>