<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数据仓库 · 可视化建模</title>
<style>
:root {
  --bg: #f8f9fb;
  --surface: #ffffff;
  --border: #e2e5ea;
  --text: #1a1d23;
  --text-secondary: #6b7280;
  --text-muted: #9ca3af;
  --layer-ods: #8b9dc3;
  --layer-dwd: #5a9e6f;
  --layer-dws: #d4a24e;
  --layer-ads: #c4685c;
  --primary: #3b6ff5;
  --danger: #e5484d;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.06);
  --shadow-md: 0 4px 12px rgba(0,0,0,.08);
  --shadow-lg: 0 12px 40px rgba(0,0,0,.12);
  --radius: 8px;
  --radius-sm: 4px;
  --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
  --mono: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0 }
body { font-family: var(--font); background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column }

/* Top Toolbar */
.toolbar {
  display: flex; align-items: center; gap: 12px; padding: 10px 16px;
  background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; z-index: 10;
}
.toolbar .brand { font-weight: 700; font-size: 14px; letter-spacing: -.01em; margin-right: 8px; white-space: nowrap }
.toolbar .brand .layer-dot { display: inline-block; width: 8px; height: 8px; border-radius: 2px; margin-right: 6px; vertical-align: middle }
.toolbar input, .toolbar select { font-size: 12px; padding: 5px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); color: var(--text); outline: none }
.toolbar input:focus, .toolbar select:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(59,111,245,.12) }
.toolbar input { width: 180px }
.toolbar select { width: 100px }
.btn { font-size: 12px; padding: 6px 14px; border-radius: var(--radius-sm); border: 1px solid var(--border); cursor: pointer; font-weight: 500; background: var(--surface); color: var(--text); transition: all .15s; white-space: nowrap }
.btn:hover { background: #f3f4f6 }
.btn-primary { background: var(--primary); color: #fff; border-color: var(--primary) }
.btn-primary:hover { background: #2b5de0 }
.btn-success { background: #30a46c; color: #fff; border-color: #30a46c }
.btn-success:hover { background: #278b5a }
.btn-ghost { border: none; background: transparent; color: var(--text-secondary); padding: 4px 8px }
.btn-ghost:hover { color: var(--text); background: #f3f4f6 }
.btn-group { display: flex; gap: 0; margin-left: auto }
.btn-group .btn { border-radius: 0; margin-left: -1px }
.btn-group .btn:first-child { border-radius: var(--radius-sm) 0 0 var(--radius-sm) }
.btn-group .btn:last-child { border-radius: 0 var(--radius-sm) var(--radius-sm) 0 }

/* Main Layout */
.main { display: flex; flex: 1; min-height: 0; overflow: hidden }
.panel-left { width: 220px; flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden }
.panel-center { flex: 1; position: relative; overflow: hidden; background: #f4f5f7;
  background-image: radial-gradient(circle, #dde0e4 1px, transparent 1px);
  background-size: 24px 24px;
}
.panel-right { width: 300px; flex-shrink: 0; background: var(--surface); border-left: 1px solid var(--border); overflow-y: auto; padding: 16px }

/* Left Panel */
.panel-left-header { padding: 12px; border-bottom: 1px solid var(--border); font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: .05em; color: var(--text-secondary) }
.panel-left-search { padding: 8px 12px }
.panel-left-search input { width: 100%; font-size: 12px; padding: 6px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm); outline: none }
.panel-left-list { flex: 1; overflow-y: auto; padding: 4px 8px }
.table-option {
  padding: 8px 10px; border-radius: var(--radius-sm); cursor: pointer; font-size: 12px;
  display: flex; align-items: center; gap: 8px; margin-bottom: 2px; transition: background .1s;
}
.table-option:hover { background: #f3f4f6 }
.table-option.selected { background: #eef2ff; color: var(--primary) }
.table-option .dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0 }
.table-option .info { flex: 1; min-width: 0 }
.table-option .info .name { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis }
.table-option .info .physical { font-size: 10px; color: var(--text-muted); margin-top: 1px }

/* Canvas */
.canvas-svg { width: 100%; height: 100%; position: absolute; top: 0; left: 0 }
.canvas-svg line.relation { stroke: #bcc4d0; stroke-width: 2; transition: stroke .15s }
.canvas-svg line.relation.active { stroke: var(--primary); stroke-width: 2.5 }
.canvas-svg line.relation:hover { stroke: #8b9dc3; stroke-width: 2.5; cursor: pointer }
.canvas-svg .relation-label { font-size: 10px; fill: var(--text-secondary); font-family: var(--mono) }
.canvas-svg .cardinality-label { font-size: 9px; fill: var(--text-muted) }

/* Table Node */
.table-node { position: absolute; background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow-md); min-width: 180px; cursor: grab; transition: box-shadow .15s; border: 2px solid transparent; user-select: none }
.table-node:hover { box-shadow: var(--shadow-lg) }
.table-node.selected { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(59,111,245,.15), var(--shadow-md) }
.table-node.dragging { cursor: grabbing; box-shadow: var(--shadow-lg); opacity: .9 }
.node-header { padding: 8px 12px; border-radius: var(--radius) var(--radius) 0 0; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid var(--border) }
.node-header .layer-tag { font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 3px; color: #fff; letter-spacing: .03em }
.node-header .alias { font-weight: 600; font-size: 13px }
.node-header .physical { font-size: 10px; color: var(--text-muted); margin-left: auto }
.node-fields { padding: 4px 0; max-height: 200px; overflow-y: auto }
.node-field { padding: 3px 12px; font-size: 11px; display: flex; align-items: center; gap: 6px; font-family: var(--mono); color: var(--text-secondary) }
.node-field .field-code { color: var(--text); font-weight: 500; width: 100px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap }
.node-field .field-type { font-size: 10px; color: var(--text-muted); width: 48px; text-align: right }
.node-field .pk-badge { font-size: 9px; background: #fef3c7; color: #92400e; padding: 1px 4px; border-radius: 2px; font-weight: 600 }
.node-field .fk-badge { font-size: 9px; background: #e0e7ff; color: #3730a3; padding: 1px 4px; border-radius: 2px; font-weight: 600 }
.node-footer { padding: 4px 12px; border-top: 1px solid var(--border); font-size: 10px; color: var(--text-muted); display: flex; justify-content: space-between }

/* Right Panel */
.panel-right h3 { font-size: 13px; font-weight: 600; margin-bottom: 12px; color: var(--text) }
.panel-right .empty-state { text-align: center; padding: 40px 0; color: var(--text-muted); font-size: 12px }
.panel-right .empty-state .icon { font-size: 32px; margin-bottom: 8px; opacity: .3 }
.panel-right .field-group { margin-bottom: 16px }
.panel-right .field-group label { display: block; font-size: 11px; font-weight: 600; color: var(--text-secondary); margin-bottom: 4px; text-transform: uppercase; letter-spacing: .04em }
.panel-right .field-group input, .panel-right .field-group select { width: 100%; font-size: 12px; padding: 6px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm); outline: none; font-family: var(--font) }
.panel-right .field-group input:focus, .panel-right .field-group select:focus { border-color: var(--primary) }
.panel-right .key-pair { display: flex; gap: 4px; align-items: center; margin-bottom: 4px; font-size: 11px; font-family: var(--mono) }
.panel-right .key-pair .arrow { color: var(--text-muted) }

/* Bottom output panel */
.panel-bottom { flex-shrink: 0; background: var(--surface); border-top: 1px solid var(--border); max-height: 240px; overflow-y: auto; display: none }
.panel-bottom.visible { display: block }
.panel-bottom-header { padding: 10px 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); font-weight: 600; font-size: 12px }
.output-table { width: 100%; border-collapse: collapse; font-size: 11px }
.output-table th { text-align: left; padding: 6px 10px; background: #f8f9fb; font-weight: 600; color: var(--text-secondary); border-bottom: 1px solid var(--border); font-size: 10px; text-transform: uppercase; letter-spacing: .03em }
.output-table td { padding: 5px 10px; border-bottom: 1px solid var(--border); font-family: var(--mono); font-size: 11px }
.output-table td input { width: 100%; border: none; background: transparent; font-family: var(--mono); font-size: 11px; padding: 2px 0; outline: none }
.output-table td input:focus { background: #eef2ff }

/* Minimap */
.minimap {
  position: absolute; bottom: 12px; right: 12px; width: 140px; height: 90px;
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  box-shadow: var(--shadow-sm); opacity: .7; pointer-events: none; z-index: 5;
}
.minimap svg { width: 100%; height: 100% }

/* Zoom controls */
.zoom-controls { position: absolute; bottom: 12px; left: 12px; display: flex; flex-direction: column; gap: 2px; z-index: 5 }
.zoom-controls .btn { width: 32px; height: 32px; padding: 0; display: flex; align-items: center; justify-content: center; font-size: 16px }
</style>
</head>
<body>

<div class="toolbar">
  <span class="brand"><span class="layer-dot" style="background:var(--primary)"></span>可视化建模</span>
  <input type="text" value="员工薪资宽表模型" placeholder="模型名称">
  <select>
    <option>DWD 明细数据层</option>
    <option>ODS 原始数据层</option>
    <option>DWS 汇总数据层</option>
    <option>ADS 应用数据层</option>
  </select>
  <input type="text" placeholder="主题域" value="薪酬" style="width:80px">
  <input type="text" placeholder="负责人" value="" style="width:80px">
  <span style="flex:1"></span>
  <div class="btn-group">
    <button class="btn" title="缩小">−</button>
    <button class="btn" style="font-size:10px;min-width:44px;text-align:center">100%</button>
    <button class="btn" title="放大">+</button>
  </div>
  <button class="btn btn-ghost" style="font-size:11px">自动布局</button>
  <button class="btn" onclick="togglePreview()">预览</button>
  <button class="btn btn-primary">保存草稿</button>
  <button class="btn btn-success">发布</button>
</div>

<div class="main">
  <!-- Left Panel -->
  <div class="panel-left">
    <div class="panel-left-header">数据表</div>
    <div class="panel-left-search"><input type="text" placeholder="搜索表名..." oninput="filterTables(this.value)"></div>
    <div class="panel-left-list" id="tableList"></div>
  </div>

  <!-- Center Canvas -->
  <div class="panel-center" id="canvas">
    <svg class="canvas-svg" id="svgCanvas"></svg>
    <div id="nodesContainer"></div>
    <div class="minimap"><svg id="minimapSvg"></svg></div>
    <div class="zoom-controls">
      <button class="btn" onclick="zoomOut()">−</button>
      <button class="btn" onclick="zoomIn()">+</button>
    </div>
  </div>

  <!-- Right Panel -->
  <div class="panel-right" id="rightPanel">
    <div class="empty-state">
      <div class="icon">◈</div>
      <div>点击节点或连线<br>查看配置详情</div>
    </div>
  </div>
</div>

<!-- Bottom Preview Panel -->
<div class="panel-bottom" id="previewPanel">
  <div class="panel-bottom-header">
    <span>数据预览 · 前 20 行</span>
    <button class="btn btn-ghost" onclick="togglePreview()" style="font-size:11px">✕ 关闭</button>
  </div>
  <div style="padding:8px 16px;overflow-x:auto">
    <table class="output-table" id="previewTable"></table>
  </div>
</div>

<script>
// ===== DATA =====
const layerColors = { ODS: '#8b9dc3', DWD: '#5a9e6f', DWS: '#d4a24e', ADS: '#c4685c' }
const layerLabels = { ODS: 'ODS 原始数据', DWD: 'DWD 明细数据', DWS: 'DWS 汇总数据', ADS: 'ADS 应用数据' }

const allTables = [
  {
    table_name: 'emp_realtime_roster', alias: 'roster', label: '员工实时花名册', layer: 'ODS',
    fields: [
      { code: 'employee_no', label: '员工编号', type: 'varchar(32)', pk: true },
      { code: 'name_cn', label: '中文名', type: 'varchar(64)', pk: false },
      { code: 'dept_code', label: '部门编码', type: 'varchar(32)', pk: false },
      { code: 'position', label: '岗位', type: 'varchar(64)', pk: false },
      { code: 'hire_date', label: '入职日期', type: 'date', pk: false },
    ],
  },
  {
    table_name: 'emp_monthly_salary', alias: 'salary', label: '员工月度工资表', layer: 'DWD',
    fields: [
      { code: 'employee_no', label: '员工编号', type: 'varchar(32)', pk: true, fk: true },
      { code: 'pay_month', label: '薪资月份', type: 'varchar(7)', pk: true },
      { code: 'base_salary', label: '基本工资', type: 'decimal(12,2)', pk: false },
      { code: 'bonus', label: '奖金', type: 'decimal(12,2)', pk: false },
      { code: 'allowance', label: '补贴', type: 'decimal(12,2)', pk: false },
      { code: 'total_amount', label: '应发合计', type: 'decimal(12,2)', pk: false },
    ],
  },
  {
    table_name: 'cost_center_monthly', alias: 'cost_ctr', label: '成本中心月度维护表', layer: 'DWS',
    fields: [
      { code: 'dept_code', label: '部门编码', type: 'varchar(32)', pk: true, fk: true },
      { code: 'month', label: '月份', type: 'varchar(7)', pk: true },
      { code: 'cc_code', label: '成本中心编码', type: 'varchar(32)', pk: false },
      { code: 'cc_name', label: '成本中心名称', type: 'varchar(128)', pk: false },
      { code: 'budget_amount', label: '预算金额', type: 'decimal(12,2)', pk: false },
    ],
  },
]

const modelTables = [
  { ...allTables[0], x: 120, y: 100, alias: 'roster' },
  { ...allTables[1], x: 440, y: 80, alias: 'salary' },
  { ...allTables[2], x: 440, y: 340, alias: 'cost_ctr' },
]

const modelRelations = [
  { from: 'roster', to: 'salary', join_type: 'left', keys: [{ left: 'employee_no', right: 'employee_no' }], cardinality: '1:N' },
  { from: 'roster', to: 'cost_ctr', join_type: 'left', keys: [{ left: 'dept_code', right: 'dept_code' }], cardinality: '1:N' },
]

const outputFields = [
  { source_alias:'salary', source_column:'employee_no', output_code:'emp_no', output_label:'员工编号', data_type:'varchar(32)' },
  { source_alias:'roster', source_column:'name_cn', output_code:'emp_name', output_label:'员工姓名', data_type:'varchar(64)' },
  { source_alias:'roster', source_column:'dept_code', output_code:'dept', output_label:'部门', data_type:'varchar(32)' },
  { source_alias:'salary', source_column:'base_salary', output_code:'base', output_label:'基本工资', data_type:'decimal(12,2)' },
  { source_alias:'salary', source_column:'total_amount', output_code:'total', output_label:'应发合计', data_type:'decimal(12,2)' },
  { source_alias:'cost_ctr',source_column:'cc_name', output_code:'cc', output_label:'成本中心', data_type:'varchar(128)' },
]

// ===== STATE =====
let selectedNode = null
let selectedEdge = null
let dragNode = null
let dragOffset = { x: 0, y: 0 }

// ===== RENDER =====
function renderLeftPanel(filter = '') {
  const list = document.getElementById('tableList')
  const filtered = allTables.filter(t => t.table_name.includes(filter) || t.label.includes(filter))
  const inModel = new Set(modelTables.map(t => t.table_name))

  list.innerHTML = filtered.map(t => `
    <div class="table-option ${inModel.has(t.table_name) ? 'selected' : ''}"
         onclick="${inModel.has(t.table_name) ? '' : `addTable('${t.table_name}')`}"
         style="${inModel.has(t.table_name) ? 'opacity:.5;cursor:default' : ''}">
      <span class="dot" style="background:${layerColors[t.layer]}"></span>
      <div class="info">
        <div class="name">${t.label}</div>
        <div class="physical">${t.table_name}</div>
      </div>
    </div>
  `).join('')
}

function addTable(name) {
  const t = allTables.find(t => t.table_name === name)
  if (!t || modelTables.some(mt => mt.table_name === name)) return
  modelTables.push({ ...t, x: 280 + Math.random() * 200, y: 100 + Math.random() * 300, alias: t.alias })
  renderAll()
}

function filterTables(v) { renderLeftPanel(v) }

function renderNodes() {
  const container = document.getElementById('nodesContainer')
  container.innerHTML = modelTables.map((t, i) => `
    <div class="table-node ${selectedNode === i ? 'selected' : ''}"
         id="node-${i}"
         style="left:${t.x}px;top:${t.y}px"
         onmousedown="startDrag(event, ${i})">
      <div class="node-header" style="background:${layerColors[t.layer]}15">
        <span class="layer-tag" style="background:${layerColors[t.layer]}">${t.layer}</span>
        <span class="alias">${t.alias}</span>
        <span class="physical">${t.table_name}</span>
      </div>
      <div class="node-fields">
        ${t.fields.map(f => `
          <div class="node-field">
            <span class="field-code" title="${f.label}">${f.code}</span>
            <span class="field-type">${f.type}</span>
            ${f.pk ? '<span class="pk-badge">PK</span>' : ''}
            ${f.fk ? '<span class="fk-badge">FK</span>' : ''}
          </div>
        `).join('')}
      </div>
      <div class="node-footer">
        <span>${t.fields.length} 字段</span>
        <span>${t.label}</span>
      </div>
    </div>
  `).join('')
}

function renderEdges() {
  const svg = document.getElementById('svgCanvas')
  const colorMap = { left: '#5a9e6f', inner: '#3b6ff5', right: '#d4a24e' }

  svg.innerHTML = modelRelations.map((rel, i) => {
    const fromNode = modelTables.find(t => t.alias === rel.from)
    const toNode = modelTables.find(t => t.alias === rel.to)
    if (!fromNode || !toNode) return ''

    const x1 = fromNode.x + 90, y1 = fromNode.y + 160
    const x2 = toNode.x + 90, y2 = toNode.y + 20
    const midX = (x1 + x2) / 2, midY = (y1 + y2) / 2
    const active = selectedEdge === i
    const color = colorMap[rel.join_type] || '#bcc4d0'

    const keyStr = rel.keys.map(k => `${k.left}=${k.right}`).join(', ')

    return `
      <defs>
        <marker id="arrow-${i}" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="5" orient="auto">
          <polygon points="0 0, 10 3.5, 0 7" fill="${color}" />
        </marker>
      </defs>
      <line class="relation ${active ? 'active' : ''}"
            x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}"
            stroke="${active ? '#3b6ff5' : color}"
            marker-end="url(#arrow-${active ? i : ''}${active ? '' : ''})"
            onclick="selectEdge(${i})" />
      <rect x="${midX - 30}" y="${midY - 18}" width="60" height="18" rx="3" fill="white" stroke="${color}" stroke-width="1" opacity="0.9" />
      <text class="relation-label" x="${midX}" y="${midY - 5}" text-anchor="middle" dominant-baseline="middle" font-size="10" fill="${color}">
        ${rel.join_type.toUpperCase()} JOIN
      </text>
      <text class="cardinality-label" x="${midX}" y="${midY + 8}" text-anchor="middle" dominant-baseline="middle" font-size="9" fill="#9ca3af">
        ${rel.cardinality} · ${keyStr}
      </text>
    `;
  }).join('')
}

function renderRightPanel() {
  const panel = document.getElementById('rightPanel')

  if (selectedNode !== null) {
    const t = modelTables[selectedNode]
    panel.innerHTML = `
      <h3>📋 ${t.alias}</h3>
      <div class="field-group"><label>表别名</label><input value="${t.alias}" onchange="updateAlias(${selectedNode}, this.value)"></div>
      <div class="field-group"><label>物理表名</label><input value="${t.table_name}" readonly style="background:#f8f9fb;color:var(--text-muted)"></div>
      <div class="field-group"><label>数仓分层</label>
        <select onchange="updateLayer(${selectedNode}, this.value)">
          ${Object.entries(layerLabels).map(([k,v]) => `<option value="${k}" ${t.layer===k?'selected':''}>${v}</option>`).join('')}
        </select>
      </div>
      <div class="field-group"><label>字段列表 (${t.fields.length})</label>
        <div style="font-size:11px;font-family:var(--mono);max-height:200px;overflow-y:auto;border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px">
          ${t.fields.map(f => `
            <div style="padding:2px 0;display:flex;gap:6px">
              <span style="color:var(--text);width:90px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${f.code}</span>
              <span style="color:var(--text-muted)">${f.type}</span>
              ${f.pk?'<span style="font-size:9px;color:#92400e">[主键]</span>':''}
              ${f.fk?'<span style="font-size:9px;color:#3730a3">[外键]</span>':''}
            </div>
          `).join('')}
        </div>
      </div>
    `
  } else if (selectedEdge !== null) {
    const rel = modelRelations[selectedEdge]
    panel.innerHTML = `
      <h3>🔗 关联关系</h3>
      <div class="field-group"><label>左表</label><input value="${rel.from}" readonly style="background:#f8f9fb"></div>
      <div class="field-group"><label>右表</label><input value="${rel.to}" readonly style="background:#f8f9fb"></div>
      <div class="field-group"><label>关联类型</label>
        <select onchange="updateJoinType(${selectedEdge}, this.value)">
          <option value="left" ${rel.join_type==='left'?'selected':''}>LEFT JOIN</option>
          <option value="inner" ${rel.join_type==='inner'?'selected':''}>INNER JOIN</option>
          <option value="right" ${rel.join_type==='right'?'selected':''}>RIGHT JOIN</option>
        </select>
      </div>
      <div class="field-group"><label>基数</label>
        <select onchange="updateCardinality(${selectedEdge}, this.value)">
          <option value="1:1" ${rel.cardinality==='1:1'?'selected':''}>1:1</option>
          <option value="1:N" ${rel.cardinality==='1:N'?'selected':''}>1:N</option>
          <option value="N:1" ${rel.cardinality==='N:1'?'selected':''}>N:1</option>
          <option value="N:M" ${rel.cardinality==='N:M'?'selected':''}>N:M</option>
        </select>
      </div>
      <div class="field-group"><label>关联字段映射</label>
        ${rel.keys.map((k, ki) => `
          <div class="key-pair">
            <input value="${k.left}" style="width:80px;font-size:11px" onchange="updateKey(${selectedEdge},${ki},'left',this.value)">
            <span class="arrow">=</span>
            <input value="${k.right}" style="width:80px;font-size:11px" onchange="updateKey(${selectedEdge},${ki},'right',this.value)">
          </div>
        `).join('')}
      </div>
      <button class="btn" style="margin-top:12px;color:var(--danger);border-color:var(--danger);font-size:11px;width:100%" onclick="removeRelation(${selectedEdge})">删除关联</button>
    `
  } else {
    panel.innerHTML = `<div class="empty-state"><div class="icon">◈</div><div>点击节点或连线<br>查看配置详情</div></div>`
  }
}

function renderPreview() {
  const panel = document.getElementById('previewPanel')
  const table = document.getElementById('previewTable')
  const cols = outputFields.map(f => f.output_code)
  const colLabels = outputFields.map(f => f.output_label)
  const mockRows = [
    ['EMP001','张三','HR','12000','16500','人力成本中心'],
    ['EMP002','李四','ENG','18000','22000','研发成本中心'],
    ['EMP003','王五','FIN','15000','19000','财务成本中心'],
  ]
  table.innerHTML = `
    <thead><tr>${colLabels.map(l => `<th>${l}</th>`).join('')}</tr></thead>
    <tbody>${mockRows.map(r => `<tr>${r.map(c => `<td>${c}</td>`).join('')}</tr>`).join('')}</tbody>
  `
}

function togglePreview() {
  const panel = document.getElementById('previewPanel')
  panel.classList.toggle('visible')
  if (panel.classList.contains('visible')) renderPreview()
}

// ===== INTERACTIONS =====
function selectNode(i) {
  selectedNode = i; selectedEdge = null; renderAll()
}

function selectEdge(i) {
  selectedEdge = i; selectedNode = null; renderAll()
}

function startDrag(e, i) {
  if (e.button !== 0) return
  e.preventDefault()
  selectNode(i)
  dragNode = i
  const node = document.getElementById(`node-${i}`)
  const rect = node.getBoundingClientRect()
  const canvasRect = document.getElementById('canvas').getBoundingClientRect()
  dragOffset = { x: e.clientX - rect.left, y: e.clientY - rect.top }
  document.addEventListener('mousemove', onDrag)
  document.addEventListener('mouseup', stopDrag)
}

function onDrag(e) {
  if (dragNode === null) return
  const canvasRect = document.getElementById('canvas').getBoundingClientRect()
  modelTables[dragNode].x = e.clientX - canvasRect.left - dragOffset.x + document.getElementById('canvas').scrollLeft
  modelTables[dragNode].y = e.clientY - canvasRect.top - dragOffset.y + document.getElementById('canvas').scrollTop
  renderAll()
}

function stopDrag() { dragNode = null; document.removeEventListener('mousemove', onDrag); document.removeEventListener('mouseup', stopDrag) }

function updateAlias(i, v) { modelTables[i].alias = v; renderAll() }
function updateLayer(i, v) { modelTables[i].layer = v; renderAll() }
function updateJoinType(i, v) { modelRelations[i].join_type = v; renderAll() }
function updateCardinality(i, v) { modelRelations[i].cardinality = v; renderAll() }
function updateKey(ri, ki, side, v) { modelRelations[ri].keys[ki][side] = v; renderAll() }
function removeRelation(i) { modelRelations.splice(i, 1); selectedEdge = null; renderAll() }

function zoomIn() { /* placeholder */ }
function zoomOut() { /* placeholder */ }

function renderAll() {
  renderNodes()
  renderEdges()
  renderRightPanel()
  renderLeftPanel()
}

// Init
renderAll()
renderLeftPanel()
</script>
</body>
</html>
