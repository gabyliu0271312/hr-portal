services:
  db:
    image: postgres:15-alpine
    container_name: hr-portal-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-hr_portal}
      POSTGRES_USER: ${DB_USER:-hr_portal}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me}
    volumes:
      - ./data/pg:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-hr_portal} -d ${DB_NAME:-hr_portal}"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build: ./backend
    container_name: hr-portal-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      gotenberg:
        condition: service_started
    environment:
      APP_ENV: ${APP_ENV:-prod}
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-hr_portal}
      DB_USER: ${DB_USER:-hr_portal}
      DB_PASSWORD: ${DB_PASSWORD:-change-me}
      JWT_SECRET: ${JWT_SECRET:-please-change-in-env}
      ADMIN_INIT_PASSWORD: ${ADMIN_INIT_PASSWORD:-admin123}
      SECRET_BOX_KEY: ${SECRET_BOX_KEY:-}
      BEISEN_BASE_URL: ${BEISEN_BASE_URL:-}
      BEISEN_APP_KEY: ${BEISEN_APP_KEY:-}
      BEISEN_APP_SECRET: ${BEISEN_APP_SECRET:-}
      ORG_ROOT_NAME: ${ORG_ROOT_NAME:-创梦天地}
      COST_ALLOCATION_APP_URL: ${COST_ALLOCATION_APP_URL:-http://192.168.10.13:37800/}
      COST_ALLOCATION_ADMIN_PATH: ${COST_ALLOCATION_ADMIN_PATH:-/admin/workbench}
      FEISHU_SSO_ENABLED: ${FEISHU_SSO_ENABLED:-false}
      FEISHU_APP_ID: ${FEISHU_APP_ID:-}
      FEISHU_APP_SECRET: ${FEISHU_APP_SECRET:-}
      FEISHU_REDIRECT_URI: ${FEISHU_REDIRECT_URI:-}
      GOTENBERG_URL: ${GOTENBERG_URL:-http://gotenberg:3000}

  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: hr-portal-gotenberg
    restart: unless-stopped
    volumes:
      - ./backend/docker/fonts:/usr/share/fonts/truetype/custom:ro
    command:
      - "gotenberg"
      - "--api-timeout=120s"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_COST_ALLOCATION_APP_URL: ${VITE_COST_ALLOCATION_APP_URL:-}
        VITE_COST_ALLOCATION_ADMIN_URL: ${VITE_COST_ALLOCATION_ADMIN_URL:-}
    container_name: hr-portal-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8080}:80"
